<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">Giriş Yap</title>
    <link rel="stylesheet" th:href="@{/css/public.css}">
</head>
<body>
<div class="page">
    <section class="hero" style="max-width: 560px; margin: 60px auto;">
        <h1>Giriş Yap</h1>
        <p>Kurum kodu, email ve şifrenizi girin.</p>

        <div th:if="${errorMessage != null}"
             style="margin-top:16px; padding:12px 14px; border-radius:8px; background:#ffe6e6; color:#8a1f1f;"
             th:text="${errorMessage}">
            Hata
        </div>

        <form th:action="@{/site/login}" method="post" style="margin-top:24px;">
            <div style="display:flex; flex-direction:column; gap:10px;">
                <label for="tenantSlug" style="font-weight:600;">Kurum Kodu / Domain</label>
                <input id="tenantSlug"
                       name="tenantSlug"
                       type="text"
                       placeholder="ornek: bahadir"
                       th:value="${tenantSlug}"
                       required
                       style="padding:12px 14px; border:1px solid #d0d0d0; border-radius:8px; font-size:16px;">

                <label for="email" style="font-weight:600; margin-top:8px;">Email</label>
                <input id="email"
                       name="email"
                       type="email"
                       placeholder="ornek@kurum.com"
                       th:value="${email}"
                       required
                       style="padding:12px 14px; border:1px solid #d0d0d0; border-radius:8px; font-size:16px;">

                <label for="password" style="font-weight:600; margin-top:8px;">Şifre</label>
                <input id="password"
                       name="password"
                       type="password"
                       required
                       style="padding:12px 14px; border:1px solid #d0d0d0; border-radius:8px; font-size:16px;">
            </div>

            <div style="margin-top:16px; display:flex; gap:12px; align-items:center;">
                <button type="submit"
                        style="padding:12px 18px; background:#111; color:#fff; border:none; border-radius:8px; cursor:pointer;">
                    Giriş Yap
                </button>

                <a th:href="@{/site}" style="text-decoration:none;">Siteye dön</a>
            </div>
        </form>
    </section>
</div>
</body>
</html>
