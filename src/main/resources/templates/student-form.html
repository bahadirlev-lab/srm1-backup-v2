<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/layout :: head(${pageTitle})}"></th:block>
</head>
<body>

<div class="app-shell">
    <div th:replace="~{fragments/layout :: sidebar(${tenant}, ${tenantSlug})}"></div>

    <main class="content-area">
        <div class="page-container">
            <div class="card">
                <h1 th:text="${formTitle}">Öğrenci</h1>

                <p>
                    <a class="button-link"
                       th:href="@{/{tenantSlug}/students(tenantSlug=${tenantSlug})}">
                        Listeye dön
                    </a>
                </p>

                <div th:if="${errorMessage != null}" class="alert alert-error" th:text="${errorMessage}">
                    Hata
                </div>

                <form th:action="${formAction}" method="post" th:object="${student}">
                    <div class="field">
                        <label>Ad *</label>
                        <input type="text" th:field="*{firstName}" required>
                    </div>

                    <div class="field">
                        <label>Soyad *</label>
                        <input type="text" th:field="*{lastName}" required>
                    </div>

                    <div class="field">
                        <label>Sınıfı *</label>
                        <input type="text" th:field="*{className}" required>
                    </div>

                    <div class="field">
                        <label>Telefon</label>
                        <input type="text" th:field="*{phone}">
                    </div>

                    <div class="field">
                        <label>Veli Adı</label>
                        <input type="text" th:field="*{parentFirstName}">
                    </div>

                    <div class="field">
                        <label>Veli Soyadı</label>
                        <input type="text" th:field="*{parentLastName}">
                    </div>

                    <div class="field">
                        <label>Veli Telefonu</label>
                        <input type="text" th:field="*{parentPhone}">
                    </div>

                    <div class="field">
                        <label>Telegram Chat ID</label>
                        <input type="text" th:field="*{telegramChatId}">
                    </div>

                    <div class="field">
                        <label>Devamsızlık</label>
                        <input type="number" min="0" th:field="*{absenceCount}">
                    </div>

                    <div class="field">
                        <label>
                            <input type="checkbox" th:field="*{active}">
                            Aktif
                        </label>
                    </div>

                    <h3>1. Sınav</h3>
                    <div class="field">
                        <label>Doğru</label>
                        <input type="number" step="0.01" th:field="*{exam1Correct}">
                    </div>
                    <div class="field">
                        <label>Yanlış</label>
                        <input type="number" step="0.01" th:field="*{exam1Wrong}">
                    </div>
                    <div class="field">
                        <label>Net</label>
                        <input type="number" step="0.01" th:field="*{exam1Net}">
                    </div>

                    <h3>2. Sınav</h3>
                    <div class="field">
                        <label>Doğru</label>
                        <input type="number" step="0.01" th:field="*{exam2Correct}">
                    </div>
                    <div class="field">
                        <label>Yanlış</label>
                        <input type="number" step="0.01" th:field="*{exam2Wrong}">
                    </div>
                    <div class="field">
                        <label>Net</label>
                        <input type="number" step="0.01" th:field="*{exam2Net}">
                    </div>

                    <h3>3. Sınav</h3>
                    <div class="field">
                        <label>Doğru</label>

                    </div>

                        <input type="number" step="0.01" th:field="*{exam3Wrong}">
                    </div>
                    <div class="field">
                        <label>Net</label>
                        <input type="number" step="0.01" th:field="*{exam3Net}">
                    </div>

                    <h3>4. Sınav</h3>

                    <div class="field">

                        <input type="number" step="0.01" th:field="*{exam4Net}">

                    <h3>5. Sınav</h3>

                    </div>
                    <div class="field">
                        <label>Net</label>
                        <input type="number" step="0.01" th:field="*{exam5Net}">
                    </div>

                    <h3>6. Sınav</h3>

                    </div>

                    </div>
                    <div class="field">
                        <label>Net</label>
                        <input type="number" step="0.01" th:field="*{exam8Net}">
                    </div>

                    <h3>9. Sınav</h3>
                    <div class="field">

                        <input type="number" step="0.01" th:field="*{exam9Correct}">
                    </div>
                    <div class="field">

                        <input type="number" step="0.01" th:field="*{exam9Wrong}">

                    <div class="field">
