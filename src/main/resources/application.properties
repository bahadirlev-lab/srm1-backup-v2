server:
port: 8080

spring:
application:
name: srm1

spring.devtools.restart.quiet-period = 500

datasource:
url: jdbc:h2:mem:srm1db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
driver-class-name: org.h2.Driver
username: sa
password: ""

h2:
console:
enabled: true
path: /h2-console

jpa:
open-in-view: false
show-sql: true
hibernate:
ddl-auto: update
properties:
hibernate.format_sql: true

thymeleaf:
cache: false